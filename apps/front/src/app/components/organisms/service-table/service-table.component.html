<table mat-table [dataSource]="services" class="service-table">

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>Fecha</th>
    <td mat-cell *matCellDef="let service" (click)="onRowClick(service)">
      {{ service.datePlace | date:'dd/MM/yyyy HH:mm' }}
      <br>
      ({{ service.dateStart | date:'HH:mm' }} - {{ service.dateEnd | date:'HH:mm' }})
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let service" (click)="onRowClick(service)">{{ service.name }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Estado</th>
    <td mat-cell *matCellDef="let service" (click)="onRowClick(service)">{{ service.status }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
