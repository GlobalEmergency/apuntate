<h1>Especialidades</h1>
<app-feedback-message [message]="message"></app-feedback-message>
<app-spinner-overlay *ngIf="loading"></app-spinner-overlay>

<div *ngIf="!loading">
  <button mat-flat-button color="primary" (click)="openCreate()" class="m-b-16" *ngIf="!showForm">
    <mat-icon>add</mat-icon> Crear especialidad
  </button>

  <mat-card *ngIf="showForm" class="cardWithShadow m-b-16">
    <mat-card-content class="p-24">
      <mat-card-title>{{ editingSpec ? 'Editar especialidad' : 'Nueva especialidad' }}</mat-card-title>
      <div class="admin-form m-t-16">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput [(ngModel)]="formName" required />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Abreviatura</mat-label>
          <input matInput [(ngModel)]="formAbbreviation" required />
        </mat-form-field>
        <div class="admin-form__actions">
          <button
            mat-flat-button
            color="primary"
            (click)="save()"
            [disabled]="saving || !formName || !formAbbreviation"
          >
            {{ editingSpec ? 'Guardar' : 'Crear' }}
          </button>
          <button mat-stroked-button (click)="cancelForm()">Cancelar</button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card *ngFor="let spec of specialities" class="cardWithShadow m-b-8">
    <mat-card-content class="p-24">
      <div class="admin-item">
        <div>
          <span class="f-w-600">{{ spec.name }}</span>
          <span class="text-muted m-l-8">({{ spec.abbreviation }})</span>
        </div>
        <div class="admin-item__actions">
          <button mat-icon-button (click)="openEdit(spec)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteSpec(spec)" [disabled]="saving">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <p *ngIf="specialities.length === 0" class="text-muted">No hay especialidades definidas.</p>
</div>
