<div class="row">

  <div class="col-lg-8">
    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Bienvenido</mat-card-title>
        <p class="mat-body-1 m-t-8">{{ userName }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Próximos servicios</mat-card-title>
        <app-servicestable
          *ngIf="services.length > 0; else noServices"
          [services]="services"
          (serviceClicked)="showService($event)">
        </app-servicestable>
        <ng-template #noServices>
          <p class="mat-body-1 text-muted m-t-16">No hay servicios próximos programados.</p>
        </ng-template>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-lg-4">
    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Tu resumen</mat-card-title>
        <p class="mat-body-1 text-muted m-t-16">Las estadísticas estarán disponibles próximamente.</p>
      </mat-card-content>
    </mat-card>
  </div>

</div>
