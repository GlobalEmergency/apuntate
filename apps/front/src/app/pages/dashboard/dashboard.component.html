<app-feedback-message [message]="message"></app-feedback-message>

<div class="row">
  <div class="col-sm-12 col-lg-8">
    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Bienvenido</mat-card-title>
        <p class="mat-body-1 m-t-8">{{ userName }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Pr&oacute;ximos servicios</mat-card-title>
        <app-service-table
          *ngIf="services.length > 0; else noServices"
          [services]="services"
          (serviceClicked)="showService($event)">
        </app-service-table>
        <ng-template #noServices>
          <p class="mat-body-1 text-muted m-t-16">No hay servicios pr&oacute;ximos programados.</p>
        </ng-template>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-sm-12 col-lg-4">
    <mat-card class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Tu resumen</mat-card-title>
        <div *ngIf="profile?.stats; else noStats" class="dashboard-stats m-t-16">
          <app-stat-icon icon="schedule" color="primary"
            [value]="profile.stats.totalHours + ' h'"
            label="Horas de servicio">
          </app-stat-icon>
          <app-stat-icon icon="assignment_turned_in" color="accent"
            [value]="'' + profile.stats.totalServices"
            label="Servicios realizados">
          </app-stat-icon>
        </div>
        <ng-template #noStats>
          <p class="mat-body-1 text-muted m-t-16">Cargando estad&iacute;sticas...</p>
        </ng-template>
      </mat-card-content>
    </mat-card>

    <mat-card *ngIf="profile" class="cardWithShadow">
      <mat-card-content class="p-24">
        <mat-card-title>Mi perfil</mat-card-title>
        <div class="dashboard-profile m-t-16">
          <app-summary-row label="Email" [value]="profile.email"></app-summary-row>
          <app-summary-row label="Miembro desde" [value]="(profile.dateStart | date:'dd/MM/yyyy') || ''"></app-summary-row>
          <div class="summary-row">
            <span class="text-muted">Rol</span>
            <span>
              <mat-chip *ngFor="let role of profile.roles">{{ role }}</mat-chip>
            </span>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
