<app-spinner-overlay *ngIf="loading"></app-spinner-overlay>

<div *ngIf="!loading && service">
  <app-service-header
    [service]="service"
    [isAdmin]="isAdmin"
    [loading]="loading"
    (publish)="publish()"
    (edit)="edit()"
    (cancelService)="cancelService()">
  </app-service-header>

  <app-feedback-message [message]="message" class="m-t-16"></app-feedback-message>

  <app-service-gaps class="m-t-16"
    [gaps]="gaps"
    [signupLoading]="signupLoading"
    [currentUserId]="currentUserId"
    (signup)="signup($event)"
    (withdraw)="withdraw($event)">
  </app-service-gaps>
</div>

<div *ngIf="!loading && !service">
  <mat-card class="cardWithShadow">
    <mat-card-content class="p-24 text-center">
      <mat-icon class="service-not-found__icon">error_outline</mat-icon>
      <p class="mat-body-1 m-t-16">Servicio no encontrado.</p>
      <button mat-flat-button color="primary" routerLink="/dashboard" class="m-t-16">Volver al inicio</button>
    </mat-card-content>
  </mat-card>
</div>
