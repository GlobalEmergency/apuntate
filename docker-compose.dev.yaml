services:
  php-fpm:
    user: root
    volumes:
      - ~/.aws:/var/www/.aws
      - ~/.composer:/var/www/.composer
      - ~/.ssh:/var/www/.ssh
      - ./apps/back:/var/www/html/:delegated
    ports:
      - "8081:80"
    environment:
      PHP_IDE_CONFIG: "serverName=apuntate,apuntate_test"

  frontend:
    ports:
      - "4210:4200"

  pgsql:
    ports:
      - "5434:5432"
