name: "SonarCloud Analysis"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=globalemergency
            -Dsonar.projectKey=GlobalEmergency_apuntate
            -Dsonar.sources=apps/back/src,apps/front/src
            -Dsonar.tests=apps/back/tests,apps/front/src
            -Dsonar.test.inclusions=**/*.spec.ts,**/*Test.php
            -Dsonar.exclusions=**/node_modules/**,**/vendor/**,**/var/**,**/dist/**
            -Dsonar.php.file.suffixes=php
            -Dsonar.typescript.file.suffixes=ts,tsx
