name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
  push:
    branches: [main]
    paths: ['apps/back/**']

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: |
          docker build -t apuntate-php-fpm -f apps/back/etc/docker/php-fpm/dev/Dockerfile apps/back
          docker build -t apuntate-pgsql -f apps/back/etc/docker/postgres/Dockerfile apps/back/etc/docker/postgres

      - name: Docker up
        run: docker compose -f docker-compose.yaml -p apuntate up -d

      - name: Composer install
        run: docker exec -u www-data --tty apuntate-php-fpm composer install --no-interaction

      - name: Check coding standards
        run: docker exec -u www-data --tty apuntate-php-fpm php -dxdebug.mode=off vendor/bin/php-cs-fixer fix --dry-run --diff --stop-on-violation

      - name: Execute migrations for tests
        run: |
          docker exec -u www-data --tty apuntate-php-fpm php ./bin/console doctrine:database:drop --if-exists --force --env=test
          docker exec -u www-data --tty apuntate-php-fpm php ./bin/console doctrine:database:create --env=test
          docker exec -u www-data --tty apuntate-php-fpm php ./bin/console doctrine:query:sql 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp"' --env=test
          docker exec -u www-data --tty apuntate-php-fpm php ./bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: PHPUnit tests
        run: docker exec -u www-data --tty -e APP_ENV=test apuntate-php-fpm php -dxdebug.mode=coverage vendor/bin/phpunit

  deploy:
    name: Deploy Backend (production)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment:
      name: Backend Production
      url: https://apuntate-back.globalemergency.online
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: ./apps/back

    steps:
      - name: Create GitHub Deployment
        id: gh-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'Backend Production',
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
              description: 'Backend deployment to production',
            });
            core.setOutput('deployment_id', deployment.data.id);
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              description: 'Deploying backend...',
            });

      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql, zip, opcache
          tools: composer:v2

      - name: Install production dependencies
        run: APP_ENV=prod composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp -r bin config migrations public src templates translations deploy/
          cp composer.json composer.lock symfony.lock .env deploy/
          cp -r vendor deploy/
          [ -f .php-version ] && cp .php-version deploy/ || true

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ vars.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: /var/www/vhosts/globalemergency.online/apuntate-back.globalemergency.online
          SOURCE: apps/back/deploy/
          ARGS: -rlDz --delete --exclude=.env.local --exclude=var --exclude=config/jwt
          SCRIPT_AFTER: |
            set -e
            cd /var/www/vhosts/globalemergency.online/apuntate-back.globalemergency.online
            export PATH="/opt/plesk/php/8.4/bin:$PATH"
            echo "Clearing cache..."
            php bin/console cache:clear --env=prod --no-debug
            echo "Running database migrations..."
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            echo "Warming up cache..."
            php bin/console cache:warmup --env=prod --no-debug
            echo "Setting permissions..."
            chmod -R 755 var/
            echo "Restarting PHP-FPM..."
            mkdir -p tmp && touch tmp/restart.txt
            echo "Deploy completed successfully!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/opt/plesk/php/8.4/bin:$PATH"
            cd /var/www/vhosts/globalemergency.online/apuntate-back.globalemergency.online
            PENDING=$(php bin/console doctrine:migrations:status --env=prod 2>&1 | grep -c "not migrated" || true)
            if [ "$PENDING" -gt 0 ]; then
              echo "ERROR: Pending migrations after deploy!"
              php bin/console doctrine:migrations:status --env=prod
              exit 1
            fi
            echo "All migrations up to date."
            curl -sf https://apuntate-back.globalemergency.online/health || echo "WARNING: Health check failed"

      - name: Update GitHub Deployment status (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.gh-deployment.outputs.deployment_id }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: 'https://apuntate-back.globalemergency.online',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Backend deployed successfully',
            });

      - name: Update GitHub Deployment status (failure)
        if: failure() && steps.gh-deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.gh-deployment.outputs.deployment_id }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'failure',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Backend deployment failed',
            });
