name: "Frontend: Lint, Format and Test"

on:
  push:
    branches:
      - main
    paths:
      - 'apps/front/**'
      - '.github/workflows/front-lint.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/front/**'
      - '.github/workflows/front-lint.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/front
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/front/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: ESLint check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test
